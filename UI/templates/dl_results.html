<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Learning Model Results</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            margin: 40px;
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            color: #007BFF; 
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 30px;
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 24px;
            text-align: center;
            color: #555;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        table {
            width: 80%;
            margin: 0 auto 40px;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        th, td {
            padding: 14px 20px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        th {
            background-color: #007BFF; 
            color: #fff;
            font-size: 18px;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #e6f7ff;
        }

        img {
            display: block;
            margin: 20px auto;
            max-width: 90%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .section {
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }

        .section img {
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .table-container {
            max-width: 100%;
            overflow-x: auto;
        }

        .model-comparison {
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .model-comparison img {
            width: 90%;
            transition: transform 0.3s ease;
        }

        .model-comparison img:hover {
            transform: scale(1.05);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007BFF; 
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 30px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deep Learning Models for CO2 Emission Prediction</h1>

        <div class="section">
            <h2>Model Performance Comparison</h2>
            <div class="table-container">
                <table>
                    <tr>
                        <th>Model</th>
                        <th>MSE</th>
                        <th>RMSE</th>
                        <th>MAE</th>
                        <th>R2</th>
                    </tr>
                    {% for row in dl_results %}
                    <tr>
                        <td>{{ row.Model }}</td>
                        <td>{{ row['MSE'] }}</td>
                        <td>{{ row['RMSE'] }}</td>
                        <td>{{ row['MAE'] }}</td>
                        <td>{{ row['R2'] }}</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </div>

        <div class="section">
            <h3>Actual vs Predicted - Deep Learning Models</h3>
            <div class="model-comparison">
                <a href="{{ url_for('model_detail', model_type='dl', model_name='LSTM') }}">
                    <img src="{{ url_for('static', filename='predictions/LSTM.png') }}" alt="LSTM">
                </a>               
            </div>
        </div>
    </div>
</body>
</html>
