<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Learning Model Results</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 40px;
            background-color: #fafafa;
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 40px;
            color: #FF6347;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 30px;
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #FF6347;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 24px;
            text-align: center;
            color: #555;
            margin-top: 40px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        table {
            width: 85%;
            margin: 20px auto;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        th, td {
            padding: 14px 25px;
            text-align: center;
            border: 1px solid #ddd;
            font-size: 16px;
        }

        th {
            background-color: #FF6347;
            color: #fff;
            font-size: 18px;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #ffe6e6;
        }

        img {
            display: block;
            margin: 20px auto;
            max-width: 80%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .section {
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }

        .section img {
            margin-bottom: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .table-container {
            max-width: 100%;
            overflow-x: auto;
        }

        .model-comparison {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
            text-align: center;
            padding: 0;
            box-sizing: border-box;
        }

        .model-comparison img {
            width: 500px;
            max-width: 500px;
            height: auto;
            transition: transform 0.3s ease;
            margin: 0;
        }

        .model-comparison img:hover {
            transform: scale(1.05);
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #FF6347;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 30px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #ff4500;
        }

        .highlight {
            color: #FF6347;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Machine Learning Models for CO2 Emission Prediction</h1>

        <div class="section">
            <h2>Model Performance Comparison</h2>
            <div class="table-container">
                <table>
                    <tr>
                        <th>Model</th>
                        <th>MSE</th>
                        <th>RMSE</th>
                        <th>MAE</th>
                        <th>R2</th>
                    </tr>
                    {% for row in ml_results %}
                    <tr>
                        <td>{{ row.Model }}</td>
                        <td>{{ row.MSE }}</td>
                        <td>{{ row.RMSE }}</td>
                        <td>{{ row.MAE }}</td>
                        <td>{{ row.R2 }}</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </div>
        <div class="section">
            <h3>Actual vs Predicted - Machine Learning Models</h3>
            <div class="model-comparison">
                <a href="{{ url_for('model_detail', model_type='ml', model_name='RidgeRegression') }}">
                    <img src="{{ url_for('static', filename='predictions/ridgeregression.png') }}" alt="Linear Regression Predictions">
                </a>
                <a href="{{ url_for('model_detail', model_type='ml', model_name='LightGBM') }}">
                    <img src="{{ url_for('static', filename='predictions/LightGBM.png') }}" alt="LightGBM Predictions">
                </a>
            </div>

            <div class="model-comparison">
                <a href="{{ url_for('model_detail', model_type='ml', model_name='XGBoost') }}">
                    <img src="{{ url_for('static', filename='predictions/XGBoost.png') }}" alt="XGBoost Predictions">
                </a>
                <a href="{{ url_for('model_detail', model_type='ml', model_name='SVM') }}">
                    <img src="{{ url_for('static', filename='predictions/SVM.png') }}" alt="SVM Predictions">
                </a>
            </div>

        </div>
    </div>
</body>
</html>
